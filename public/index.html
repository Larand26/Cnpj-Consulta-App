<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta CNPJ</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="/index.css" />
    <link rel="stylesheet" href="/styles/nav.css" />
    <link rel="stylesheet" href="/styles/inputs.css" />
    <link rel="stylesheet" href="/styles/data.css" />
    <link rel="stylesheet" href="/styles/filters.css" />
    <link rel="stylesheet" href="/styles/overlay.css" />
  </head>
  <body>
    <nav>
      <img src="./assets/images/logo.svg" alt="logo" class="logo" />
      <button class="btn-filter"><i class="fa-solid fa-filter"></i></button>
    </nav>
    <main>
      <section class="input-cnpj-container">
        <input
          type="text"
          class="input-cnpj"
          id="input-cnpj"
          placeholder="Digite o CNPJ"
        />
        <button class="btn-search" id="btn-search">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </section>
      <section class="data-container">
        <div class="data-content" id="data-content"></div>
      </section>
      <section class="filters-container open" id="filters-container">
        <i class="fa-solid fa-filter"></i>
        <hr />
        <div class="filters-content" id="filters-content">
          <div class="filter">
            <input
              type="checkbox"
              name="Razão Social"
              id="filter-razao-social"
            />
            <label for="filter-razao-social">Razão Social</label>
          </div>
          <div class="filter">
            <input
              type="checkbox"
              name="Razão Social"
              id="filter-razao-social"
            />
            <label for="filter-razao-social">Razão Social</label>
          </div>
          <div class="filter">
            <input
              type="checkbox"
              name="Razão Social"
              id="filter-razao-social"
            />
            <label for="filter-razao-social">Razão Social</label>
          </div>
          <div class="filter">
            <input
              type="checkbox"
              name="Razão Social"
              id="filter-razao-social"
            />
            <label for="filter-razao-social">Razão Social</label>
          </div>
        </div>
      </section>
    </main>
    <div class="overlay" id="overlay"></div>
    <script type="module" src="/js/consultCnpj.js"></script>
    <script type="module" src="/js/openFilters.js"></script>
  </body>
</html>
