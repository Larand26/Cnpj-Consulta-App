<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta CNPJ</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="/index.css" />
    <link rel="stylesheet" href="/styles/nav.css" />
    <link rel="stylesheet" href="/styles/inputs.css" />
    <link rel="stylesheet" href="/styles/data.css" />
  </head>
  <body>
    <nav>
      <img src="./assets/images/logo.svg" alt="logo" class="logo" />
      <button class="btn-filter"><i class="fa-solid fa-filter"></i></button>
    </nav>
    <main>
      <section class="input-cnpj-container">
        <input
          type="text"
          class="input-cnpj"
          id="input-cnpj"
          placeholder="Digite o CNPJ"
        />
        <button class="btn-search" id="btn-search">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </section>
      <section class="data-container">
        <div class="data-content">
          <div class="data-card">
            <h2 class="data-card-title">Razão Social</h2>
            <p class="data-card-value">Valor da Razão Social</p>
          </div>
          <div class="data-card">
            <h2 class="data-card-title">Nome Fantasia</h2>
            <p class="data-card-value">Valor do Nome Fantasia</p>
          </div>
          <div class="data-card">
            <h2 class="data-card-title">Nome Fantasia</h2>
            <p class="data-card-value">Valor do Nome Fantasia</p>
          </div>
          <div class="data-card">
            <h2 class="data-card-title">Nome Fantasia</h2>
            <p class="data-card-value">Valor do Nome Fantasia</p>
          </div>
          <div class="data-card">
            <h2 class="data-card-title">Nome Fantasia</h2>
            <p class="data-card-value">Valor do Nome Fantasia</p>
          </div>
          <div class="data-card">
            <h2 class="data-card-title">Nome Fantasia</h2>
            <p class="data-card-value">Valor do Nome Fantasia</p>
          </div>
          <div class="data-card">
            <h2 class="data-card-title">Nome Fantasia</h2>
            <p class="data-card-value">Valor do Nome Fantasia</p>
          </div>
        </div>
      </section>
    </main>
    <script src="/js/consultCnpj.js"></script>
  </body>
</html>
